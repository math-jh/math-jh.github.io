<!doctype html>
<html lang="{{ page.lang | default: 'ko' }}">
<head>
  <meta charset="utf-8">
  <title>{{ page.title | default: "Redirecting…" }}</title>
  <meta name="robots" content="noindex">
  <meta http-equiv="refresh" content="0; url={{ page.redirect_to | relative_url }}">
  <link rel="canonical" href="{{ page.redirect_to | relative_url }}">
  <script>location.replace("{{ page.redirect_to | relative_url }}");</script>
</head>
<body>
  <p>이동 중입니다… <a href="{{ page.redirect_to | relative_url }}">{{ page.redirect_to }}</a></p>
</body>
</html>
