<!-- https://t.co/dKP3o1e -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
  document.documentElement.className = document.documentElement.className.replace(/\bno-js\b/g, '') + ' js ';
  {% if site.multilingual %}
    window.addEventListener('DOMContentLoaded', function(){
      var pathname = window.location.pathname.split('/');
      
      // ko나 en이 아니면 종료
      if(!(pathname[1] == "en" || pathname[1] == "ko")){
        document.getElementById('lang_container').style.display="none";
        return;
      }
      
      var newpathname = "";
      if (pathname[1] == "en") {
        document.querySelector("#lang").checked=true;
        var newlang="/ko";
      } else {
        document.querySelector("#lang").checked=false;
        var newlang="/en";
      }
      
      for (var i = 2; i < pathname.length; i++) {
        newpathname += "/";
        newpathname += pathname[i];
      }
      
      var newurl = newlang + newpathname;
      var http = new XMLHttpRequest();
      http.open('HEAD', newurl, false);
      http.send();
      if (http.status == 404) {
        document.getElementById('lang_container').style.display="none";
      }
    })
  {% endif %}  
</script>

<!-- For all browsers -->
<link rel="stylesheet" id="theme-light" href="{{ '/assets/css/main.css' | relative_url }}">
{% if site.dark_theme %}
  <link rel="stylesheet" id="theme-dark" href="/assets/css/main_dark.css">
  <script>
  /* Pre-paint theme apply (3-state: auto|light|dark) — prevents FOUC.
     Mirrors Color_scheme.js; kept tiny + dependency-free so it runs before paint. */
  (function () {
    function ck(n) {
      var a = document.cookie.split('; ');
      for (var i = 0; i < a.length; i++) { if (a[i].indexOf(n + '=') === 0) return a[i].slice(n.length + 1); }
      return null;
    }
    var m = ck('MTHEME');
    if (m !== 'light' && m !== 'dark' && m !== 'auto') {
      var l = ck('MDARK'); m = l === 'Y' ? 'dark' : l === 'N' ? 'light' : 'auto';
    }
    var dark = m === 'dark' || (m === 'auto' && window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches);
    var d = document.getElementById('theme-dark'), g = document.getElementById('theme-light');
    if (d) d.disabled = !dark;
    if (g) g.disabled = dark;
  })();
  </script>
{% endif %}
