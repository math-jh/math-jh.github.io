<meta name="theme-color" content="#071734">
<meta charset="utf-8">

{% include seo.html %}

<!-- Favicon — the "black box": navy tile + brass open square (brand motif) -->
<link rel="icon" type="image/svg+xml" href='data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"%3E%3Crect width="32" height="32" fill="%230a1120"/%3E%3Crect x="8" y="8" width="16" height="16" fill="none" stroke="%23c89441" stroke-width="3"/%3E%3C/svg%3E'>

{% unless site.atom_feed.hide %}
  <link href="{% if site.atom_feed.path %}{{ site.atom_feed.path }}{% else %}{{ '/feed.xml' | relative_url }}{% endif %}" type="application/atom+xml" rel="alternate" title="{{ site.title }} Feed">
{% endunless %}

<!-- https://t.co/dKP3o1e -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
  document.documentElement.className = document.documentElement.className.replace(/\bno-js\b/g, '') + ' js ';
</script>

<!-- Google Analytics 는 config(analytics.provider: google-gtag) 기반의
     analytics.html(scripts.html 에서 include, production 한정)에서 한 번만 emit
     한다. 여기에 인라인 gtag 를 또 두면 production 에서 GA 가 이중 발사된다. -->

<!-- For all browsers -->
<link rel="stylesheet" id="theme-light" href="{{ '/assets/css/main.css' | relative_url }}">
{% if site.dark_theme %}
  <link rel="stylesheet" id="theme-dark" href="/assets/css/main_dark.css">
  <script>
  /* Pre-paint theme apply (3-state: auto|light|dark) — prevents FOUC.
     Mirrors Color_scheme.js; kept tiny + dependency-free so it runs before paint. */
  (function () {
    function ck(n) {
      var a = document.cookie.split('; ');
      for (var i = 0; i < a.length; i++) { if (a[i].indexOf(n + '=') === 0) return a[i].slice(n.length + 1); }
      return null;
    }
    var m = ck('MTHEME');
    if (m !== 'light' && m !== 'dark' && m !== 'auto') {
      var l = ck('MDARK'); m = l === 'Y' ? 'dark' : l === 'N' ? 'light' : 'auto';
    }
    var dark = m === 'dark' || (m === 'auto' && window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches);
    var d = document.getElementById('theme-dark'), g = document.getElementById('theme-light');
    if (d) d.disabled = !dark;
    if (g) g.disabled = dark;
  })();
  </script>
{% endif %}
<link rel="preload" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@5/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@5/css/all.min.css"></noscript>

{% if site.head_scripts %}
  {% for script in site.head_scripts %}
    <script src="{{ script | relative_url }}"></script>
  {% endfor %}
{% endif %}
