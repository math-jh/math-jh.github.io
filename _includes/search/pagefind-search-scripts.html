{% assign lang = site.locale %}
{% assign lang_prefix = page.url | truncate: 3, "" %}
{% if lang_prefix contains "en" or lang_prefix contains "ko" %}
  {% assign lang = lang_prefix | remove_first: "/" %}
{% endif %}

<link rel="stylesheet" href="{{ '/pagefind/pagefind-ui.css' | relative_url }}">
<script src="{{ '/pagefind/pagefind-ui.js' | relative_url }}" defer></script>
<script>
window.addEventListener('DOMContentLoaded', function () {
    if (typeof PagefindUI === 'undefined') {
        var poll = setInterval(function () {
            if (typeof PagefindUI !== 'undefined') {
                clearInterval(poll);
                mountPagefind();
            }
        }, 50);
    } else {
        mountPagefind();
    }

    function mountPagefind() {
        var pageLang = "{{ lang | slice: 0,2 | default: 'en' }}";
        if (document.getElementById('pagefind-search-popup')) {
            new PagefindUI({
                element: "#pagefind-search-popup",
                showSubResults: true,
                showImages: false,
                resetStyles: false,
                baseUrl: "{{ '/' | relative_url }}",
                pageSize: 10,
                excerptLength: 30,
                translations: pageLang === 'ko' ? {
                    placeholder: "검색어를 입력하세요...",
                    clear_search: "지우기",
                    load_more: "더 보기",
                    search_label: "이 사이트 검색",
                    filters_label: "필터",
                    zero_results: "[SEARCH_TERM]에 대한 검색 결과가 없습니다",
                    many_results: "[SEARCH_TERM]에 대한 [COUNT]개 결과",
                    one_result: "[SEARCH_TERM]에 대한 [COUNT]개 결과",
                    alt_search: "[SEARCH_TERM]에 대한 결과가 없습니다. 대신 [DIFFERENT_TERM]에 대한 결과를 표시합니다",
                    search_suggestion: "[SEARCH_TERM]에 대한 결과가 없습니다. 다음 검색어를 시도해 보세요:",
                    searching: "[SEARCH_TERM] 검색 중..."
                } : {}
            });
        }
        if (document.getElementById('pagefind-search-page')) {
            new PagefindUI({
                element: "#pagefind-search-page",
                showSubResults: true,
                showImages: false,
                resetStyles: false,
                baseUrl: "{{ '/' | relative_url }}",
                pageSize: 10,
                excerptLength: 30,
                translations: pageLang === 'ko' ? {
                    placeholder: "검색어를 입력하세요...",
                    clear_search: "지우기",
                    load_more: "더 보기",
                    search_label: "이 사이트 검색",
                    filters_label: "필터",
                    zero_results: "[SEARCH_TERM]에 대한 검색 결과가 없습니다",
                    many_results: "[SEARCH_TERM]에 대한 [COUNT]개 결과",
                    one_result: "[SEARCH_TERM]에 대한 [COUNT]개 결과",
                    alt_search: "[SEARCH_TERM]에 대한 결과가 없습니다. 대신 [DIFFERENT_TERM]에 대한 결과를 표시합니다",
                    search_suggestion: "[SEARCH_TERM]에 대한 결과가 없습니다. 다음 검색어를 시도해 보세요:",
                    searching: "[SEARCH_TERM] 검색 중..."
                } : {}
            });
        }
    }
});
</script>
