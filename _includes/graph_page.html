<style>
  /* 풀블리드 캔버스 — default 레이아웃은 사이드바가 없어 폭을 다 쓴다 */
  .initial-content { max-width: none; margin: 0; padding: 0; }
  #xgraph { width: 100%; height: calc(100vh - 60px); position: relative; }
  .xgraph-toolbar {
    position: fixed; top: 64px; left: 14px; z-index: 6;
    font: 13px sans-serif;
  }
  .xgraph-toolbar a {
    border: 1px solid rgba(140,140,150,.4); background: rgba(127,127,127,.08);
    color: inherit; border-radius: 5px; padding: 3px 10px; text-decoration: none;
  }
  .xgraph-hint {
    position: fixed; bottom: 14px; left: 14px; z-index: 6;
    font: 12px sans-serif; color: rgba(140,140,150,.85);
  }
  /* 노드 클릭 시 뜨는 카드(이웃 강조 + 글로 이동 버튼) */
  .xgraph-pop {
    position: fixed; z-index: 7; display: none;
    transform: translate(-50%, 10px);
    background: rgba(20,22,28,.92); color: #e7e3d8;
    border: 1px solid rgba(169,135,74,.55); border-radius: 7px;
    padding: 8px 10px; max-width: 260px;
    box-shadow: 0 6px 20px rgba(0,0,0,.35); font: 13px sans-serif;
  }
  .xgraph-pop.show { display: block; }
  .xgraph-pop .xpop-title { font-weight: bold; margin-bottom: 6px; line-height: 1.3; }
  .xgraph-pop .xpop-go {
    display: inline-block; text-decoration: none;
    background: #a9874a; color: #1a1410; font-weight: bold;
    border-radius: 5px; padding: 3px 10px;
  }
</style>

<div class="xgraph-toolbar">
  {% if include.lang == 'ko' %}<a href="/en/graph/">English ↗</a>{% else %}<a href="/ko/graph/">한국어 ↗</a>{% endif %}
</div>

<div id="xgraph" data-lang="{{ include.lang }}"></div>

<div class="xgraph-pop" id="xgraph-pop">
  <div class="xpop-title"></div>
  <a class="xpop-go" href="#">{% if include.lang == 'ko' %}글로 이동 →{% else %}Open post →{% endif %}</a>
</div>

<div class="xgraph-hint">{% if include.lang == 'ko' %}드래그=이동 · 휠=확대 · 호버=이웃 강조 · 클릭=선택{% else %}drag=pan · wheel=zoom · hover=highlight · click=select{% endif %}</div>

<script src="/assets/js/vendor/force-graph/force-graph.min.js"></script>
<script src="/assets/js/custom/Graph_page.js"></script>
