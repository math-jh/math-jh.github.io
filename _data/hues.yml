# Per-category colour map — CURATED GROUPED PALETTE (math-logical families).
#
# Each BIG family shares a hue identity; subjects are told apart mainly by
# LIGHTNESS (`l`, the mid-tone used on the /categories index bars + dots).
# Families:
#   A. 교양수학 + 수학기초론        → violet   (~256)        [calculus lives here]
#   B. 대수학 + 정수론(reserve)     → blue     (~216)
#   C. 해석학(reserve)              → teal     (~188)
#   D. 기하학 = 위상 + 미분기하 + 대수기하 + 거울대칭
#                                   → warm analogous BAND (hue 8–44, red→amber),
#                                     so the 4 sub-areas stay subtly distinct
#                                     while still reading as one geometry family.
#   Misc                            → achromatic grey
#
# Keys must match the post `categories:` string exactly ("Big / Subject").
# Reserved categories (Number Theory / Analysis / Calculus) are kept for future
# use. hue/sat constant per family (except D's band); tune `l` per subject.

# --- A. 교양수학 + 수학기초론 — violet ---
