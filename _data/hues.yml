# Per-category hero colour map (HSL hue + saturation).
#
# Drives the generative gradient hero (no image files). Looked up by
# _layouts/default.html via page.categories[0] so posts get their colour
# AUTOMATICALLY from their category — adding a new post needs no per-post
# colour frontmatter. The post's lightness (2nd axis) is computed from its
# weight at build time; only hue/sat live here.
#
# Keys must match the post `categories:` string exactly ("Big / Subject").
# Math subjects: sat 42%. Misc: achromatic (sat 0%, 1-axis lightness only).
#
# These values mirror what the subject-home pages bake in `hero_hue`; keep
# the two in sync (subject homes are hand-curated, posts read from here).

